kind = "web"
previewPath = "/"
title = "PRIXMA Landing Page"
version = "1.0.0"
id = "artifacts/prixma"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20871

[services.development]
run = "pnpm --filter @workspace/prixma run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prixma", "run", "build" ]
publicDir = "artifacts/prixma/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20871"
BASE_PATH = "/"
